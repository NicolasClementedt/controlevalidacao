<script>
  const URL_API =
    "https://script.google.com/macros/s/AKfycbyCKbrlJ9QLMe7nLlloWfZlOSIGtyC0b11RCUBnSm8_zeGG-eNZlTqbTcLlQOlE_pxMwg/exec";

  async function buscarDetalhes() {
    const corpo = document.getElementById("conteudo");
    const params = new URLSearchParams(window.location.search);
    const idDesejado = params.get("id");

    // 1. TENTA PEGAR DA MEMÓRIA (INSTANTÂNEO)
    const cache = localStorage.getItem("cacheRegistros");
    let registro = null;

    if (cache) {
      const dados = JSON.parse(cache);
      registro = dados.find((item) => item.idUnico == idDesejado);
    }

    // 2. SE NÃO ACHOU NO CACHE OU DEU F5, BUSCA NO GOOGLE (LENTO)
    if (!registro) {
      console.log("Cache vazio, buscando no Google...");
      const response = await fetch(`${URL_API}?action=listar`);
      const dados = await response.json();
      registro = dados.find((item) => item.idUnico == idDesejado);
      // Atualiza o cache para a próxima vez
      localStorage.setItem("cacheRegistros", JSON.stringify(dados));
    }

    // 3. DESENHA NA TELA
    if (registro) {
      corpo.innerHTML = `
        <div class="item"><span class="label">Placa</span><div class="valor">${registro.placa}</div></div>
        <div class="item"><span class="label">Revisor</span><div class="valor">${registro.revisor}</div></div>
        <div class="item"><span class="label">Status</span><div class="valor">${registro.status}</div></div>
        `;
    } else {
      corpo.innerHTML = "Registro não encontrado.";
    }
  }

  window.onload = buscarDetalhes;
</script>

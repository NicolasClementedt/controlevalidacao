<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./index.css" />
    <link rel="icon" href="https://plus.unsplash.com/premium_vector-1737044844450-e58e2e19d482?q=80&w=580&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
    type="image"/>
    <title>Controle de Validações</title>
  </head>
  <body>
    <header>
      <h1>Pagina de Cadastro </h1>
      <p>Registre aqui os casos anormais e inconsistêntes</p>

      <nav>
        <a href="index.html"><p>Pagina de Cadastro</p></a>
        <a href="registros.html"><p>Pagina de Visualização</p></a>
      </nav>
    </header>
    <main>
      <h2>Formulário</h2>
      <form id="form">
        <fieldset>
          <legend>Dados da Transação</legend>
          <label for="idTransacao"> ID da Transação: </label>
          <input
            type="text"
            id="idTransacao"
            name="idTransacao"
            placeholder="Insira o ID completo da transação"
          /><br /><br />

          <label for="pracaPortico">Praça / Pórtico: </label>
          <input
            type="text"
            id="pracaPortico"
            name="pracaPortico"
            placeholder="Ex: P3 - Joõa Fulano"
          /><br /><br />

          <label for="dataTransacao">
            Data e Hora da Transação (use o Ícone de calendário):
          </label>
          <input
            type="datetime-local"
            id="dataTransacao"
            name="dataTransacao"
          /><br /><br />
        </fieldset>

        <fieldset>
          <legend>Dados de Pagamento</legend>
          <label for="placa"> Placa do Veículo: </label>
          <input type="text" id="placa" name="placa" placeholder="ABC1D23" />

          <label for="metodoPagamento"> Qual o Método de Pagamento? </label>
          <select id="metodoPagamento" name="metodoPagamento">
            <option value="TAG">TAG</option>
            <option value="Free Flow">Free Flow</option>
            <option value="Isento">Isento</option>
            <option value="Violação">Violação</option>
          </select>

          <label for="osa"> Qual a Emissora da TAG ?</label>
          <select id="osa" name="osa">
            <option value="Sem Parar ">Sem Parar</option>
            <option value="Green Pass">Green Pass</option>
            <option value="Move Mais">Move Mais</option>
            <option value="Veloe">Veloe</option>
            <option value="Automático">Automático</option>
            <option value="Indefinido">Nulo ou Indefinido</option>
          </select>
        </fieldset>

        <fieldset>
          <legend>Detalhes sobre o Caso</legend>
          <label for="descricao">Descreva o problema:</label>
          <textarea
            id="descricao"
            name="descricao"
            rows="5"
            cols="30"
            placeholder="Ex: Dados inconsistentes, sistema não aceita validação, precisa atualizar cadastro na OSA"
          ></textarea>

          <label for="qualidadeFotos"> Contexto sobre a criação do registro:  </label
          ><textarea
            id="qualidadeFotos"
            name="qualidadeFotos"
            rows="5"
            cols="30"
            placeholder="Ex: Trânsito registrado no dia 10/02/2026. Demanda de Rejeite 008 da Nova 364. "
          ></textarea>
        </fieldset>

        <fieldset>
          <legend>Sobre o Revisor</legend>
          <label for="revisor"> Caso registrado por: </label>
          <input
            type="text"
            id="revisor"
            name="revisor"
            placeholder=" Nome do Revisor"
          />
        </fieldset>

        <button type="submit">Salvar Registro</button>
      </form>
    </main>

    <footer><p>Time de Suporte Tecsidel</p></footer>

    <script src="script.js"></script>
  </body>
</html>
